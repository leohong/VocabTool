<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>單字極限特訓系統 V05 (強迫記憶版)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans selection:bg-indigo-900 selection:text-indigo-200 overscroll-none">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ==========================================
    // --- SVG 圖示元件 ---
    // ==========================================
    const IconBook = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>;
    const IconPlay = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
    const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;
    const IconX = () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
    const IconAlert = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;
    const IconVolume = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>;
    const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
    const IconDownload = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;
    const IconUpload = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>;
    const IconLogOut = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>;

    // 預設字庫
    const rawVocab = [
      { en: 'system', zh: '系統 (範例字)', pos: 'n.' },
      { en: 'acknowledgement', zh: '承認/確認 (範例字)', pos: 'n.' }
    ];

    function App() {
      // ----------------------------------------
      // --- 1. 狀態與資料庫管理 ---
      // ----------------------------------------
      const [dbName, setDbName] = useState(() => localStorage.getItem('vocabV05_currentDB') || 'vocab_2000');
      const [dbList, setDbList] = useState(() => {
        const saved = localStorage.getItem('vocabV05_dbList');
        return saved ? JSON.parse(saved) : ['vocab_2000', 'vocab_7000'];
      });

      const [state, setState] = useState({ currentDay: 1, learnedWords: [], mistakes: {} });
      const { currentDay, learnedWords = [], mistakes } = state;
      const [vocabList, setVocabList] = useState(rawVocab);
      const [wordsPerDay, setWordsPerDay] = useState(50);
      
      const [view, setView] = useState('dashboard'); 
      const [showMistakeModal, setShowMistakeModal] = useState(false);
      const [showPreviewModal, setShowPreviewModal] = useState(false);
      const [sessionType, setSessionType] = useState('daily'); 
      
      const [queue, setQueue] = useState([]);                  
      const [currentWord, setCurrentWord] = useState(null);    
      const [currentSessionWords, setCurrentSessionWords] = useState([]); 

      const [userInput, setUserInput] = useState('');       
      const [typoCount, setTypoCount] = useState(0);       
      const [mustTypeCorrectly, setMustTypeCorrectly] = useState(false); 

      const inputRef = useRef(null);

      // --- 系統同步與續傳 ---
      useEffect(() => {
        localStorage.setItem('vocabV05_currentDB', dbName);
        const savedState = localStorage.getItem(`vocabV05_state_${dbName}`);
        if (savedState) setState(JSON.parse(savedState));
        else setState({ currentDay: 1, learnedWords: [], mistakes: {} });
        
        const savedVocab = localStorage.getItem(`vocabV05_customVocab_${dbName}`);
        setVocabList(savedVocab ? JSON.parse(savedVocab) : rawVocab);
        
        const savedWords = localStorage.getItem(`vocabV05_wordsPerDay_${dbName}`);
        setWordsPerDay(savedWords ? parseInt(savedWords, 10) : 50);

        // 檢查中斷進度
        const tempSession = localStorage.getItem(`vocabV05_tempSession_${dbName}`);
        if (tempSession) {
          const parsed = JSON.parse(tempSession);
          if (parsed.queue && parsed.queue.length > 0 && parsed.date === new Date().toDateString()) {
            if (window.confirm("偵測到今日尚未完成的特訓進度，是否繼續？（選擇取消將放棄該次進度）")) {
              setSessionType(parsed.sessionType);
              setCurrentSessionWords(parsed.currentSessionWords);
              setQueue(parsed.queue);
              setCurrentWord(parsed.queue[0]);
              setView(parsed.view);
            } else {
              localStorage.removeItem(`vocabV05_tempSession_${dbName}`);
            }
          }
        }
      }, [dbName]);

      useEffect(() => {
        if (dbName) localStorage.setItem(`vocabV05_state_${dbName}`, JSON.stringify(state));
      }, [state, dbName]);

      // 自動暫存
      useEffect(() => {
        if (view !== 'dashboard' && view !== 'summary') {
          const sessionData = { queue, currentSessionWords, sessionType, view, date: new Date().toDateString() };
          localStorage.setItem(`vocabV05_tempSession_${dbName}`, JSON.stringify(sessionData));
        } else if (view === 'summary') {
          localStorage.removeItem(`vocabV05_tempSession_${dbName}`);
        }
      }, [queue, view, sessionType, dbName, currentSessionWords]);

      // --- 發音 ---
      const speak = (text) => {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = 'en-US';
          utterance.rate = 0.8;
          window.speechSynthesis.speak(utterance);
        }
      };

      // 新增：每日字數變動時，即時寫回 localStorage 存檔
      useEffect(() => {
        if (dbName) localStorage.setItem(`vocabV05_wordsPerDay_${dbName}`, wordsPerDay);
      }, [wordsPerDay, dbName]);

      useEffect(() => {
        if ((view === 'scanning' || view === 'spelling') && currentWord) speak(currentWord.en);
        if (view === 'spelling' && inputRef.current) inputRef.current.focus();
      }, [currentWord, view]);

      // ----------------------------------------
      // --- 2. 核心邏輯與演算法 ---
      // ----------------------------------------
      
      const activeMistakesList = Object.values(mistakes).filter(m => m.mistakesCount > 0);
      const mistakesTotal = activeMistakesList.length;
      
      // 溫度計指示燈
      let indicator = { color: 'text-emerald-400', border: 'border-emerald-500/50', bg: 'bg-emerald-950/20', icon: '🟢', title: '狀態良好', msg: '吸收狀態極佳，可維持或適度調高單字量。' };
      if (mistakesTotal >= 50) indicator = { color: 'text-amber-400', border: 'border-amber-500/50', bg: 'bg-amber-950/20', icon: '🟡', title: '記憶塞車', msg: '錯題開始堆積，建議暫緩推進，發動大會考清除負債。' };
      if (mistakesTotal >= 100) indicator = { color: 'text-red-400', border: 'border-red-500/50', bg: 'bg-red-950/20', icon: '🔴', title: '過載警告', msg: '引擎嚴重過熱！請將字數降至10字，立即發動大會考！' };

      // 預覽名單計算
      const getPreviewWords = () => {
        const startIndex = (currentDay - 1) * wordsPerDay;
        let sliced = vocabList.slice(startIndex, startIndex + wordsPerDay);
        if (sliced.length === 0 && vocabList.length > 0) sliced = vocabList.slice(-wordsPerDay);
        return sliced;
      };
      const previewWordsList = getPreviewWords();

      const startTodaySession = () => {
        if (previewWordsList.length === 0) return alert("字典為空，請先匯入字庫！");
        // 賦予免疫標籤，同一天重複犯錯只扣一次分
        const initializedWords = previewWordsList.map(w => ({ ...w, _hasCountedMistake: false }));
        setSessionType('daily');
        setCurrentSessionWords(initializedWords);
        setQueue(initializedWords);
        setCurrentWord(initializedWords[0]);
        setView('scanning');
      };

      const startExamSession = () => {
        if (mistakesTotal === 0) return alert("錯題庫目前完美清空，無需大會考！🎉");
        // 隨機抽樣最多 50 字進行大會考
        const shuffled = [...activeMistakesList].sort(() => 0.5 - Math.random()).slice(0, 50).map(m => ({ ...m.data, _hasCountedMistake: false }));
        setSessionType('exam');
        setCurrentSessionWords(shuffled);
        setQueue(shuffled);
        setCurrentWord(shuffled[0]);
        setTypoCount(0);
        setMustTypeCorrectly(false);
        setUserInput('');
        setView('spelling');
      };

      // 第一關：快速掃描
      const handleScan = (isKnown) => {
        const current = queue[0];
        const newQueue = queue.slice(1);

        setState(prev => ({
          ...prev,
          learnedWords: prev.learnedWords.includes(current.en) ? prev.learnedWords : [...prev.learnedWords, current.en]
        }));

        if (!isKnown) {
          current._hasCountedMistake = true;
          setState(prev => {
            const m = prev.mistakes[current.en] || { mistakesCount: 0, correctCount: 0, data: current };
            return {
              ...prev,
              mistakes: { ...prev.mistakes, [current.en]: { ...m, mistakesCount: m.mistakesCount + 1, correctCount: 0 } }
            };
          });
        }

        if (newQueue.length === 0) {
          // 掃描完畢 ➔ 強制進入全填空盲測
          setQueue(currentSessionWords);
          setCurrentWord(currentSessionWords[0]);
          setTypoCount(0);
          setMustTypeCorrectly(false);
          setUserInput('');
          setView('spelling');
        } else {
          setQueue(newQueue);
          setCurrentWord(newQueue[0]);
        }
      };

      // 觸控手勢與鍵盤支援 (掃描模式)
      useEffect(() => {
        let touchStartX = 0, touchStartY = 0;
        const handleKeyDown = (e) => {
          if (view === 'scanning' && currentWord) {
            if (e.key === 'ArrowLeft') handleScan(true);
            if (e.key === 'ArrowRight') handleScan(false);
          }
        };
        const handleTouchStart = (e) => { if (view === 'scanning') { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; }};
        const handleTouchEnd = (e) => {
          if (view !== 'scanning') return;
          const diffX = e.changedTouches[0].clientX - touchStartX;
          const diffY = e.changedTouches[0].clientY - touchStartY;
          if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
            if (diffX > 0) handleScan(true); else handleScan(false);
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('touchstart', handleTouchStart, { passive: true });
        window.addEventListener('touchend', handleTouchEnd, { passive: true });
        return () => {
          window.removeEventListener('keydown', handleKeyDown);
          window.removeEventListener('touchstart', handleTouchStart);
          window.removeEventListener('touchend', handleTouchEnd);
        };
      }, [view, currentWord, queue]);

      // 第二關：填空盲測
      const handleSpellingSubmit = (e) => {
        e.preventDefault();
        const isCorrect = userInput.trim().toLowerCase() === currentWord.en.trim().toLowerCase();

        if (isCorrect) {
          if (mustTypeCorrectly) {
            proceedToNext(); // 被迫抄寫不計分
            return;
          }
          // 真實答對，啟動雙倍消除法
          if (sessionType === 'exam' || mistakes[currentWord.en]) {
            setState(prev => {
              const m = prev.mistakes[currentWord.en];
              if (!m) return prev;
              const newCorrect = (m.correctCount || 0) + 1;
              const target = Math.min(m.mistakesCount * 2, 6); 
              const newMistakes = { ...prev.mistakes };
              if (newCorrect >= target) delete newMistakes[currentWord.en];
              else newMistakes[currentWord.en] = { ...m, correctCount: newCorrect };
              return { ...prev, mistakes: newMistakes };
            });
          }
          proceedToNext();
        } else {
          speak(currentWord.en);
          if (typoCount === 0) {
            setTypoCount(1); // 第一次手滑警告
            setUserInput('');
          } else {
            setTypoCount(2); // 第二次真實失憶，強迫觀看並重抄
            setMustTypeCorrectly(true);
            setUserInput('');
            if (!currentWord._hasCountedMistake) {
              currentWord._hasCountedMistake = true; 
              setState(prev => {
                const m = prev.mistakes[currentWord.en] || { mistakesCount: 0, correctCount: 0, data: currentWord };
                return {
                  ...prev,
                  mistakes: { ...prev.mistakes, [currentWord.en]: { ...m, mistakesCount: m.mistakesCount + 1, correctCount: 0 } }
                };
              });
            }
          }
        }
      };

      const proceedToNext = () => {
        const newQueue = queue.slice(1);
        setTypoCount(0);
        setMustTypeCorrectly(false);
        setUserInput('');
        if (newQueue.length === 0) setView('summary');
        else { setQueue(newQueue); setCurrentWord(newQueue[0]); }
      };

      const handleExitSession = () => { if (window.confirm("確定要暫停離開嗎？系統已為您存檔。")) setView('dashboard'); };
      const goToNextDay = () => {
        if (sessionType === 'daily') setState(prev => ({ ...prev, currentDay: prev.currentDay + 1 }));
        setView('dashboard');
      };

      // ----------------------------------------
      // --- 3. 檔案匯入匯出與重置功能 ---
      // ----------------------------------------
      
      const downloadFile = (filename, content, type) => {
        const element = document.createElement("a");
        const file = new Blob([content], {type});
        element.href = URL.createObjectURL(file);
        element.download = filename;
        document.body.appendChild(element);
        element.click();
        document.body.removeChild(element);
      };

      // JSON 備份
      const exportJson = () => {
        const backup = { dbName, state, vocabList, wordsPerDay, exportDate: new Date().toISOString() };
        downloadFile(`特訓備份_${dbName}_${new Date().getTime()}.json`, JSON.stringify(backup, null, 2), 'application/json');
      };
      
      const handleImportJson = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            if (data.dbName && data.state) {
              // 1. 先確認字庫是否存在於 dbList，若無則建立
              let currentDbList = [...dbList];
              if (!currentDbList.includes(data.dbName)) {
                 currentDbList.push(data.dbName);
                 setDbList(currentDbList);
                 localStorage.setItem('vocabV05_dbList', JSON.stringify(currentDbList));
              }
              
              // 2. 強制寫入 localStorage 打底，避免 React 狀態非同步時間差
              localStorage.setItem('vocabV05_currentDB', data.dbName);
              localStorage.setItem(`vocabV05_state_${data.dbName}`, JSON.stringify(data.state));
              localStorage.setItem(`vocabV05_customVocab_${data.dbName}`, JSON.stringify(data.vocabList || rawVocab));
              localStorage.setItem(`vocabV05_wordsPerDay_${data.dbName}`, data.wordsPerDay || 50);

              // 3. 更新 React 狀態
              setDbName(data.dbName);
              setState(data.state);
              setVocabList(data.vocabList || rawVocab);
              setWordsPerDay(data.wordsPerDay || 50);
              alert(`成功覆蓋還原！已切換至資料庫：${data.dbName}`);
            } else alert("JSON 格式不符。");
          } catch(err) { alert("檔案解析失敗。"); }
        };
        reader.readAsText(file);
        e.target.value = "";
      };

      // TXT 匯出入 (向下相容)
      const exportDictionaryTXT = () => {
        let content = "=== 特訓完整字庫 ===\n\n";
        vocabList.forEach((w, idx) => { content += `${idx + 1}. [${w.pos}] ${w.en} --> ${w.zh}\n`; });
        downloadFile(`字典_${dbName}.txt`, content, 'text/plain');
      };

      const exportMistakesTXT = () => {
        if(activeMistakesList.length === 0) return alert("錯題庫為空，無需匯出。");
        let content = `=== 核心錯題本個人紀錄 ===\n\n`;
        activeMistakesList.forEach((m, idx) => { content += `${idx + 1}. 錯誤次數: ${m.mistakesCount}次 | [${m.data.pos}] ${m.data.en} --> ${m.data.zh}\n`; });
        downloadFile(`錯題本_${dbName}.txt`, content, 'text/plain');
      };

      const handleImportTXT = (e, isMistakes) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          const text = event.target.result;
          if (isMistakes && text.includes("核心錯題本個人紀錄")) {
            const lines = text.split("\n");
            const newMistakes = { ...mistakes };
            let count = 0;
            lines.forEach(line => {
              const match = line.match(/錯誤(?:次數)?[:\s]*(\d+)次\s*\|\s*\[(.*?)\]\s*(.+?)\s*-->\s*(.*)/); // 修改：放寬擷取所有字元包含 . 和 '
              if (match) {
                const [_, mistakesCount, pos, en, zh] = match;
                newMistakes[en.trim()] = { mistakesCount: parseInt(mistakesCount, 10), correctCount: 0, data: { en: en.trim(), zh: zh.trim(), pos: pos.trim() } };
                count++;
              }
            });
            setState(prev => ({ ...prev, mistakes: newMistakes }));
            alert(`成功導入錯題！(向下相容升級完畢) 共 ${count} 字。`);
          } else if (!isMistakes && text.includes("特訓完整字庫")) {
            const lines = text.split("\n");
            const importedVocab = [];
            lines.forEach(line => {
              const match = line.match(/\d+\.\s*\[(.*?)\]\s*(.+?)\s*-->\s*(.*)/); // 修改：放寬擷取所有字元包含 . 和 '
              if (match) importedVocab.push({ en: match[2].trim(), zh: match[3].trim(), pos: match[1].trim() });
            });
            if (importedVocab.length > 0) {
              setVocabList(importedVocab);
              localStorage.setItem(`vocabV05_customVocab_${dbName}`, JSON.stringify(importedVocab));
              alert(`字典匯入成功！共 ${importedVocab.length} 字。`);
            }
          } else { alert("無法識別檔案格式。"); }
        };
        reader.readAsText(file);
        e.target.value = "";
      };

      const handleAddDB = () => {
        const newName = window.prompt("請輸入全新資料庫代碼 (僅限英文與數字):");
        if (newName && newName.trim()) {
          const cleaned = newName.replace(/[^a-zA-Z0-9_]/g, '');
          if (cleaned && !dbList.includes(cleaned)) {
            const updated = [...dbList, cleaned];
            setDbList(updated);
            localStorage.setItem('vocabV05_dbList', JSON.stringify(updated));
          }
          if (cleaned) setDbName(cleaned);
        }
      };

      const removeMistake = (wordKey) => {
        setState(prev => {
          const newMistakes = { ...prev.mistakes };
          delete newMistakes[wordKey];
          return { ...prev, mistakes: newMistakes };
        });
      };

      const resetProgress = () => {
        if(window.confirm(`確定清除【${dbName}】的所有學習紀錄嗎？(無法復原)`)) {
          setState({ currentDay: 1, learnedWords: [], mistakes: {} });
        }
      };

      // 修改：只刪除目前作用中的資料庫，不波及其他配置檔
      const deleteCurrentDB = () => {
        if(window.confirm(`警告：確定要徹底刪除【${dbName}】字庫的所有資料與設定嗎？此操作無法復原。`)) {
          Object.keys(localStorage).forEach(key => {
            if(key.includes(`_${dbName}`)) localStorage.removeItem(key);
          });
          
          const updatedList = dbList.filter(name => name !== dbName);
          const nextDb = updatedList.length > 0 ? updatedList[0] : 'vocab_2000';
          setDbList(updatedList);
          localStorage.setItem('vocabV05_dbList', JSON.stringify(updatedList.length > 0 ? updatedList : ['vocab_2000']));
          setDbName(nextDb);
          
          alert(`已刪除字庫【${dbName}】。`);
          window.location.reload();
        }
      };

      // ----------------------------------------
      // --- 4. 畫面渲染 (UI) ---
      // ----------------------------------------
      return (
        <div className="min-h-screen flex flex-col items-center p-4 md:p-8">
          
          <header className="w-full max-w-2xl flex justify-between items-center mb-6 bg-slate-800 p-4 rounded-2xl shadow-md border border-slate-700">
            <h1 className="text-xl font-bold text-indigo-400 flex items-center gap-2"><IconBook /> 極限單字特訓 V05</h1>
            <div className="flex items-center gap-2">
              <span className="text-sm text-slate-400">目前天數:</span>
              <select value={currentDay} onChange={(e) => setState(prev => ({...prev, currentDay: parseInt(e.target.value, 10)}))} disabled={view !== 'dashboard'} className="bg-slate-900 border border-slate-700 text-indigo-300 rounded px-2 py-1 text-xs focus:outline-none disabled:opacity-50">
                {Array.from({length: Math.max(50, Math.ceil(vocabList.length / wordsPerDay))}, (_, i) => i + 1).map(d => ( <option key={d} value={d}>第 {d} 天</option> ))}
              </select>
            </div>
          </header>

          <main className="w-full max-w-2xl flex-1 flex flex-col justify-center">
            {view === 'dashboard' && (
              <div className="space-y-6 animate-[fadeIn_0.4s_ease-in-out]">
                
                {/* 區塊 1: 📊 戰況監控區 */}
                <div className="space-y-4">
                  <div className={`p-5 rounded-2xl border ${indicator.border} ${indicator.bg} flex justify-between items-center transition-colors duration-500`}>
                    <div>
                      <h3 className={`font-black text-lg ${indicator.color}`}>{indicator.icon} {indicator.title}</h3>
                      <p className="text-sm text-slate-300 mt-1">{indicator.msg}</p>
                    </div>
                    <div className="text-right">
                      <span className="text-xs text-slate-400 block mb-1">錯題負債</span>
                      <span className={`text-4xl font-black ${indicator.color}`}>{mistakesTotal}</span>
                    </div>
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div className="bg-slate-800 p-6 rounded-2xl shadow-md border border-slate-700 text-center">
                      <span className="text-sm text-slate-400 font-medium block mb-1">學習進度覆蓋</span>
                      <span className="text-3xl font-bold text-indigo-400">{learnedWords.length} / {vocabList.length}</span>
                    </div>
                    <button onClick={() => setShowMistakeModal(true)} className="bg-slate-800 hover:bg-slate-700 p-6 rounded-2xl shadow-md border border-slate-700 text-center transition-colors group">
                      <span className="text-sm text-slate-400 font-medium block mb-1 group-hover:text-slate-300">管理錯題庫</span>
                      <span className="text-sm font-bold text-indigo-400 underline">檢視細節 🔍</span>
                    </button>
                  </div>
                </div>

                {/* 區塊 2: 🔥 特訓行動區 */}
                <div className="bg-slate-800 p-6 rounded-2xl shadow-md border border-slate-700 space-y-4">
                  <button onClick={startTodaySession} className="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold text-lg flex items-center justify-center gap-2 transition-colors shadow-lg">
                    <IconPlay /> 發動流水線 (探索新字 ➔ 強制盲測)
                  </button>
                  <button onClick={startExamSession} className="w-full py-3 bg-red-900/80 hover:bg-red-800 border border-red-700/50 text-red-100 rounded-xl font-bold text-base flex items-center justify-center gap-2 transition-colors">
                    🔥 降溫特訓：隨機 50 字錯題大會考
                  </button>
                  <button onClick={() => setShowPreviewModal(true)} className="w-full text-sm text-indigo-400 hover:text-indigo-300 underline font-medium block pt-2 text-center">
                    🔍 預覽今日特訓單字 ({previewWordsList.length} 字)
                  </button>
                </div>

                {/* 區塊 3: 🗄️ 資料庫設定區 */}
                <div className="bg-slate-800 p-5 rounded-2xl shadow-md border border-slate-700 space-y-4">
                  <div className="flex flex-col sm:flex-row justify-between gap-4">
                    <div className="flex items-center gap-2 flex-1">
                      <span className="text-sm font-bold text-slate-400">🗄️ 字庫:</span>
                      <select value={dbName} onChange={(e) => setDbName(e.target.value)} className="bg-slate-900 border border-slate-700 text-indigo-400 rounded-lg py-1 px-2 text-sm font-mono focus:outline-none w-full sm:w-auto">
                        {dbList.map(name => <option key={name} value={name}>{name}</option>)}
                      </select>
                      <button onClick={handleAddDB} className="text-xs py-1.5 px-2.5 bg-slate-700 hover:bg-slate-600 rounded-lg flex-shrink-0">+ 新增</button>
                    </div>
                    <div className="flex items-center gap-2">
                      <label className="text-sm font-medium text-slate-400">每日字數:</label>
                      <input type="number" min="1" max="500" value={wordsPerDay} onChange={(e) => setWordsPerDay(Math.max(1, parseInt(e.target.value, 10) || 1))} className="w-20 bg-slate-900 border border-slate-700 rounded-md py-1 px-2 text-sm text-center focus:outline-none" />
                    </div>
                  </div>
                  <div className="flex justify-between pt-3 border-t border-slate-700/50">
                     <button onClick={resetProgress} className="text-xs text-slate-500 hover:text-red-400 underline">重設此區進度</button>
                     <button onClick={deleteCurrentDB} className="text-xs text-slate-500 hover:text-red-400 underline">徹底刪除目前字庫</button>
                  </div>
                </div>

                {/* 區塊 4: 💾 檔案備份區 */}
                <div className="grid grid-cols-2 md:grid-cols-3 gap-2">
                  <label className="py-2.5 px-2 bg-indigo-950/40 hover:bg-indigo-900 border border-indigo-800/50 text-indigo-300 text-xs font-semibold rounded-lg flex flex-col items-center gap-1 transition-colors cursor-pointer"><IconUpload /> JSON 還原覆蓋<input type="file" accept=".json" onChange={handleImportJson} className="hidden" /></label>
                  <label className="py-2.5 px-2 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 text-xs font-semibold rounded-lg flex flex-col items-center gap-1 transition-colors cursor-pointer"><IconUpload /> 匯入字典 (TXT)<input type="file" accept=".txt" onChange={(e)=>handleImportTXT(e, false)} className="hidden" /></label>
                  <label className="py-2.5 px-2 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 text-xs font-semibold rounded-lg flex flex-col items-center gap-1 transition-colors cursor-pointer"><IconUpload /> 匯入錯題 (TXT)<input type="file" accept=".txt" onChange={(e)=>handleImportTXT(e, true)} className="hidden" /></label>
                  
                  <button onClick={exportJson} className="py-2.5 px-2 bg-indigo-950/40 hover:bg-indigo-900 border border-indigo-800/50 text-indigo-300 text-xs font-semibold rounded-lg flex flex-col items-center gap-1 transition-colors"><IconDownload /> JSON 全備份匯出</button>
                  <button onClick={exportDictionaryTXT} className="py-2.5 px-2 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 text-xs font-semibold rounded-lg flex flex-col items-center gap-1 transition-colors"><IconDownload /> 匯出字典 (TXT)</button>
                  <button onClick={exportMistakesTXT} className="py-2.5 px-2 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 text-xs font-semibold rounded-lg flex flex-col items-center gap-1 transition-colors"><IconDownload /> 匯出錯題 (TXT)</button>
                </div>
              </div>
            )}

            {/* 流水線 1：快速掃描 */}
            {view === 'scanning' && currentWord && (
              <div className="flex flex-col items-center animate-[fadeIn_0.3s_ease-in-out]">
                <div className="w-full flex justify-between items-center mb-4">
                  <div className="text-slate-400 font-medium flex items-center gap-2"><IconAlert />第一關：快速篩選 (剩 {queue.length} 字)</div>
                  <button onClick={handleExitSession} className="text-xs px-3 py-1.5 bg-slate-800 hover:bg-red-950/40 text-slate-400 hover:text-red-400 rounded-lg border border-slate-700 flex items-center gap-1 transition-colors"><IconLogOut /> 暫停存檔</button>
                </div>
                <div className="bg-slate-800 w-full aspect-[4/3] max-h-[400px] rounded-3xl shadow-2xl border border-slate-700 flex flex-col items-center justify-center p-8 mb-8 text-center relative touch-none select-none">
                  <button onClick={() => speak(currentWord.en)} className="absolute top-6 right-6 p-3 bg-slate-700 hover:bg-indigo-900 text-slate-300 rounded-full transition-colors"><IconVolume /></button>
                  <span className="text-indigo-400 font-mono font-medium mb-4">{currentWord.pos}</span>
                  <h2 className="text-5xl md:text-6xl font-black text-slate-100 tracking-tight mb-6">{currentWord.en}</h2>
                  <p className="text-2xl text-slate-300">{currentWord.zh}</p>
                </div>
                <div className="w-full grid grid-cols-2 gap-4">
                  <button onClick={() => handleScan(true)} className="py-5 bg-emerald-950/40 hover:bg-emerald-900/60 text-emerald-400 rounded-2xl font-bold text-xl flex flex-col items-center gap-2 border border-emerald-800/60"><IconCheck />認識 (右滑)</button>
                  <button onClick={() => handleScan(false)} className="py-5 bg-rose-950/40 hover:bg-rose-900/60 text-rose-400 rounded-2xl font-bold text-xl flex flex-col items-center gap-2 border border-rose-800/60"><IconX />不熟 (左滑)</button>
                </div>
              </div>
            )}

            {/* 流水線 2 & 大會考：強制填空盲測 */}
            {view === 'spelling' && currentWord && (
              <div className="flex flex-col items-center animate-[fadeIn_0.3s_ease-in-out] w-full">
                <div className="w-full flex justify-between items-center mb-4">
                  <div className="text-indigo-400 font-medium flex items-center gap-2"><span>✍️ 盲測輸出中 (剩 {queue.length} 字)</span></div>
                  <button onClick={handleExitSession} className="text-xs px-3 py-1.5 bg-slate-800 hover:bg-red-950/40 text-slate-400 hover:text-red-400 rounded-lg border border-slate-700 flex items-center gap-1 transition-colors"><IconLogOut /> 暫停存檔</button>
                </div>
                <div className="bg-slate-800 w-full rounded-3xl shadow-2xl border border-slate-700 p-8 mb-6 text-center relative">
                  <button onClick={() => speak(currentWord.en)} className="absolute top-4 right-4 p-2 bg-slate-700 hover:bg-indigo-900 text-slate-400 rounded-full transition-colors"><IconVolume /></button>
                  <span className="text-indigo-400 font-mono font-medium mb-2 block">{currentWord.pos}</span>
                  <h2 className="text-3xl md:text-4xl font-black text-slate-100 tracking-tight mb-2">{currentWord.zh}</h2>
                  <div className="text-sm font-mono tracking-widest text-slate-500 mt-2">{currentWord.en.length} 字母 ( {Array(currentWord.en.length).fill('_').join(' ')} )</div>
                </div>
                <div className={`w-full bg-slate-800 p-6 rounded-2xl border shadow-xl transition-colors duration-300 ${typoCount === 1 ? 'border-amber-500/80' : typoCount >= 2 ? 'border-red-500/80' : 'border-slate-700'}`}>
                  <form onSubmit={handleSpellingSubmit} className="space-y-4">
                    <div className="flex justify-between items-center min-h-[24px]">
                      <label className="text-sm text-slate-400 font-medium">請拼寫完整單字：</label>
                      {typoCount === 1 && !mustTypeCorrectly && <span className="text-xs font-bold text-amber-400 bg-amber-950/40 px-2 py-0.5 rounded border border-amber-900/60 animate-pulse">⚠️ 手滑警告！再錯將強迫重抄</span>}
                      {mustTypeCorrectly && <span className="text-xs font-bold text-red-400 bg-red-950/40 px-2 py-0.5 rounded border border-red-900/60">❌ 失憶判定！連對進度歸零</span>}
                    </div>
                    
                    {mustTypeCorrectly && (
                      <div className="bg-slate-900 p-4 rounded-xl border border-emerald-900/50 mb-2">
                        <span className="text-xs text-slate-500 block mb-1">神經鏈結斷裂，請看著答案親手輸入一次：</span>
                        <span className="text-3xl font-black font-mono text-emerald-400 tracking-widest select-none">{currentWord.en}</span>
                      </div>
                    )}

                    <input type="text" ref={inputRef} value={userInput} onChange={(e) => setUserInput(e.target.value)} placeholder="在此輸入..." autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck="false" className={`w-full py-4 px-6 bg-slate-900 border-2 rounded-xl text-xl font-bold font-mono text-center transition-colors tracking-widest focus:outline-none ${typoCount === 1 ? 'border-amber-500/50 text-amber-300' : mustTypeCorrectly ? 'border-emerald-500 text-emerald-300' : 'border-slate-700 text-indigo-300 focus:border-indigo-500'}`} />
                    <button type="submit" className={`w-full py-3 font-bold rounded-xl transition-colors shadow-md text-white ${mustTypeCorrectly ? 'bg-emerald-700 hover:bg-emerald-600' : 'bg-indigo-600 hover:bg-indigo-700'}`}>
                      {mustTypeCorrectly ? "已確實手寫記下 (Enter)" : "送出檢查 (Enter)"}
                    </button>
                  </form>
                </div>
              </div>
            )}

            {/* 任務完成 */}
            {view === 'summary' && (
              <div className="bg-slate-800 p-8 rounded-3xl shadow-2xl border border-slate-700 text-center animate-[fadeIn_0.5s_ease-in-out] space-y-6">
                <div className="w-20 h-20 bg-emerald-950 text-emerald-400 rounded-full flex items-center justify-center mx-auto mb-2 border border-emerald-800"><IconCheck /></div>
                <h2 className="text-3xl font-black text-slate-100">特訓完美結束！</h2>
                <p className="text-slate-400 text-base">高壓輸出完成，記憶鏈結已加深。<br/>請隨時關注溫度燈號調控節奏。</p>
                <div className="pt-4">
                  <button onClick={goToNextDay} className="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold text-lg flex items-center justify-center gap-2 transition-colors shadow-lg">
                    {sessionType === 'daily' ? '打卡存檔，前往明日排程' : '回到指揮中心'}
                  </button>
                </div>
              </div>
            )}
          </main>

          {/* --- 本日單字預覽 Modal --- */}
          {showPreviewModal && (
            <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-[fadeIn_0.2s_ease-in-out]">
              <div className="bg-slate-800 w-full max-w-lg rounded-3xl shadow-2xl flex flex-col max-h-[80vh] border border-slate-700">
                <div className="p-6 border-b border-slate-700 flex justify-between items-center">
                  <div>
                    <h3 className="text-xl font-bold text-slate-100">本日學習單字預覽</h3>
                    <p className="text-xs text-slate-400 mt-0.5">資料庫：{dbName} • 共有 {previewWordsList.length} 字</p>
                  </div>
                  <button onClick={() => setShowPreviewModal(false)} className="p-2 text-slate-400 hover:text-slate-200 bg-slate-700 rounded-full">✕</button>
                </div>
                <div className="p-4 flex-1 overflow-y-auto space-y-2">
                  {previewWordsList.length === 0 ? <div className="text-center py-12 text-slate-500">此天數目前沒有單字。</div> : 
                    previewWordsList.map((word, idx) => (
                      <div key={idx} className="flex items-center gap-3 p-3 bg-slate-900/50 rounded-xl border border-slate-700/60">
                        <button onClick={() => speak(word.en)} className="p-2 bg-slate-800 text-indigo-400 rounded-lg border border-slate-700"><IconVolume /></button>
                        <div>
                          <div className="flex items-baseline gap-2">
                            <span className="font-bold font-mono text-base text-slate-200">{word.en}</span>
                            <span className="text-xs text-indigo-400 font-mono">({word.pos})</span>
                          </div>
                          <span className="text-sm text-slate-400">{word.zh}</span>
                        </div>
                      </div>
                    ))
                  }
                </div>
              </div>
            </div>
          )}

          {/* --- 錯題本檢視 Modal --- */}
          {showMistakeModal && (
            <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-[fadeIn_0.2s_ease-in-out]">
              <div className="bg-slate-800 w-full max-w-2xl rounded-3xl shadow-2xl flex flex-col max-h-[85vh] border border-slate-700">
                <div className="p-6 border-b border-slate-700 flex justify-between items-center">
                  <div>
                    <h3 className="text-xl font-bold text-slate-100">深層弱點管理中心</h3>
                    <p className="text-xs text-slate-400 mt-0.5">需連續答對 (錯誤數 × 2) 次方可消除，最高上限 6 次。</p>
                  </div>
                  <button onClick={() => setShowMistakeModal(false)} className="p-2 text-slate-400 hover:text-slate-200 bg-slate-700 rounded-full">✕</button>
                </div>
                <div className="p-4 flex-1 overflow-y-auto space-y-2">
                  {activeMistakesList.length === 0 ? <div className="text-center py-12 text-slate-500">目前沒有弱點，大腦狀態極佳！🎉</div> : 
                    activeMistakesList.sort((a,b) => b.mistakesCount - a.mistakesCount).map((item) => {
                      const target = Math.min(item.mistakesCount * 2, 6);
                      const current = item.correctCount || 0;
                      const progress = Math.min((current / target) * 100, 100);
                      return (
                        <div key={item.data.en} className="flex flex-col sm:flex-row sm:items-center justify-between p-4 bg-slate-900/50 rounded-xl border border-slate-700/60 gap-4 group">
                          <div className="flex items-center gap-3">
                            <button onClick={() => speak(item.data.en)} className="p-2 bg-slate-800 text-indigo-400 rounded-lg border border-slate-700"><IconVolume /></button>
                            <div>
                              <div className="flex items-baseline gap-2">
                                <span className="font-bold font-mono text-lg text-slate-200">{item.data.en}</span>
                                <span className="text-xs text-indigo-400 font-mono">({item.data.pos})</span>
                              </div>
                              <span className="text-sm text-slate-400">{item.data.zh}</span>
                            </div>
                          </div>
                          <div className="flex items-center gap-3 w-full sm:w-auto">
                            <div className="flex flex-col gap-1 w-full sm:w-40 flex-shrink-0">
                              <div className="flex justify-between text-xs font-mono">
                                <span className="text-red-400">總失誤: {item.mistakesCount}</span>
                                <span className="text-emerald-400">連對: {current} / {target}</span>
                              </div>
                              <div className="w-full bg-slate-800 rounded-full h-2 overflow-hidden border border-slate-700">
                                <div className="bg-emerald-500 h-2 transition-all duration-300" style={{width: `${progress}%`}}></div>
                              </div>
                            </div>
                            <button onClick={() => removeMistake(item.data.en)} className="p-2 text-slate-500 hover:text-red-400 hover:bg-red-950/40 rounded-lg transition-colors flex-shrink-0"><IconTrash /></button>
                          </div>
                        </div>
                      )
                    })
                  }
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</body>
</html>
