<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>極限單字特訓系統</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body
  class="bg-slate-900 text-slate-100 font-sans p-4 md:p-8 flex justify-center min-h-screen overscroll-none selection:bg-indigo-900 selection:text-indigo-200">

  <div id="root" class="w-full max-w-2xl flex flex-col"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ==========================================
    // --- SVG 圖示元件 ---
    // ==========================================
    const IconBook = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>;
    const IconPlay = () => <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
    const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;
    const IconX = () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
    const IconAlert = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;
    const IconVolume = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>;

    const rawVocab = [
      { en: 'system', zh: '系統 (範例字)', pos: 'n.' },
      { en: 'acknowledgement', zh: '承認/確認 (範例字)', pos: 'n.' }
    ];

    const mapPos = (pos) => {
      if (!pos) return 'n.';
      const p = pos.toLowerCase().trim();
      if (p.includes('noun')) return 'n.';
      if (p.includes('verb')) return 'v.';
      if (p.includes('adjective')) return 'adj.';
      if (p.includes('adverb')) return 'adv.';
      if (p.includes('preposition')) return 'prep.';
      if (p.includes('conjunction')) return 'conj.';
      if (p.includes('pronoun')) return 'pron.';
      if (p.includes('determiner')) return 'det.';
      if (p.includes('article')) return 'art.';
      if (p.includes('idiom')) return 'idiom';
      return pos;
    };

    const cleanApostrophe = (str) => {
      return (str || '').trim().toLowerCase().replace(/[’‘`′]/g, "'");
    };

    const maskText = (text, word) => {
      if (!text || !word) return '';
      let maskedTextStr = text;
      const w = word.trim();
      const escaped = w.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
      
      const regex1 = new RegExp('\\b' + escaped + '[a-zA-Z]*\\b', 'gi');
      maskedTextStr = maskedTextStr.replace(regex1, '______');
      
      if (w.toLowerCase().includes('acknowledg')) {
        maskedTextStr = maskedTextStr.replace(/\backnowledg(e)?ment(s)?\b/gi, '______');
      } else if (w.toLowerCase().includes('judg')) {
        maskedTextStr = maskedTextStr.replace(/\bjudg(e)?ment(s)?\b/gi, '______');
      }
      
      return maskedTextStr;
    };

    const maskExample = (eg, word) => {
      if (!eg || !word) return '';
      const parts = eg.split(/\s*(\([^)]+\))\s*$/);
      const enPart = parts[0];
      const zhPart = parts[1] || '';
      
      const maskedEn = maskText(enPart, word);
      return zhPart ? `${maskedEn} ${zhPart}` : maskedEn;
    };

    function App() {
      // ----------------------------------------
      // --- 0. 版本管理常數 (三碼版本號規則) ---
      // ----------------------------------------
      const APP_VERSION = "1.4.0"; 
      const DISPLAY_VERSION = APP_VERSION.split('.').slice(0, 2).join('.');

      // ----------------------------------------
      // --- 1. 狀態與資料庫管理 ---
      // ----------------------------------------
      const [isInputFocused, setIsInputFocused] = useState(false);
      const [dbName, setDbName] = useState(() => localStorage.getItem('vocab_currentDB') || 'vocab_2000');
      const [dbList, setDbList] = useState(() => {
        const saved = localStorage.getItem('vocab_dbList');
        return saved ? JSON.parse(saved) : ['vocab_2000', 'vocab_7000'];
      });

      const defaultState = {
        currentDay: 1,
        learnedWords: [],
        mistakes: {},
        historicalMistakes: {},
        streak: { count: 0, lastDate: null }
      };

      const [state, setState] = useState(defaultState);
      const { currentDay, learnedWords = [], mistakes = {}, historicalMistakes = {}, streak = { count: 0, lastDate: null } } = state;

      const [vocabList, setVocabList] = useState(rawVocab);
      const [wordsPerDay, setWordsPerDay] = useState(50);
      const [ghostsPerDay, setGhostsPerDay] = useState(10); // 自訂每日幽靈數
      const [speechRate, setSpeechRate] = useState(() => {
        const saved = localStorage.getItem('vocab_speechRate');
        return saved ? parseFloat(saved) : 0.8;
      });
      const [speechEnabled, setSpeechEnabled] = useState(() => {
        const saved = localStorage.getItem('vocab_speechEnabled');
        return saved ? saved === 'true' : true;
      });

      const [view, setView] = useState('dashboard');
      const [showMistakeModal, setShowMistakeModal] = useState(false);
      const [showHistoryModal, setShowHistoryModal] = useState(false);
      const [showPreviewModal, setShowPreviewModal] = useState(false);
      const [showAllPreviewModal, setShowAllPreviewModal] = useState(false);
      const [showImportOptionsModal, setShowImportOptionsModal] = useState(false);
      const [sessionType, setSessionType] = useState('daily');
      const importTxtInputRef = useRef(null);

      // --- 字典與手動加字狀態 ---
      const [showDictModal, setShowDictModal] = useState(false);
      const [isDictHintMode, setIsDictHintMode] = useState(false);
      const [dictMaskWord, setDictMaskWord] = useState('');
      const [searchQuery, setSearchQuery] = useState('');
      const [searchLoading, setSearchLoading] = useState(false);
      const [searchError, setSearchError] = useState(null);
      const [dictResults, setDictResults] = useState([]);
      const [localMatches, setLocalMatches] = useState([]);
      const [formEn, setFormEn] = useState('');
      const [formPos, setFormPos] = useState('n.');
      const [formZh, setFormZh] = useState('');
      const [formEg, setFormEg] = useState('');
      const [insertPosition, setInsertPosition] = useState('end');

      // --- 編輯單字與全字庫過濾分頁狀態 ---
      const [editingIndex, setEditingIndex] = useState(-1);
      const [editEn, setEditEn] = useState('');
      const [editPos, setEditPos] = useState('');
      const [editZh, setEditZh] = useState('');
      const [editEg, setEditEg] = useState('');
      const [allSearchQuery, setAllSearchQuery] = useState('');
      const [allPage, setAllPage] = useState(1);
      const itemsPerPage = 50;

      // --- 聽音背單字狀態 ---
      const [showAudioSetupModal, setShowAudioSetupModal] = useState(false);
      const [audioSource, setAudioSource] = useState('daily'); // 'daily', 'mistakes', 'history', 'library'
      const [audioRange, setAudioRange] = useState('all'); // 'all', 'page', 'custom', 'word'
      const [audioStartIdx, setAudioStartIdx] = useState(1);
      const [audioEndIdx, setAudioEndIdx] = useState(50);
      const [audioQueue, setAudioQueue] = useState([]);
      const [currentAudioIndex, setCurrentAudioIndex] = useState(0);
      const [isAudioPlaying, setIsAudioPlaying] = useState(false);
      const [audioSettings, setAudioSettings] = useState(() => {
        const saved = localStorage.getItem('vocab_audioSettings');
        const defaultSettings = {
          repeats: 2,
          wordPause: 1.5,
          hideSpelling: false,
          readExample: false,
          volume: 80,
          spellingPause: 0,
          enVoiceName: '',
          zhVoiceName: ''
        };
        if (saved) {
          try {
            return { ...defaultSettings, ...JSON.parse(saved) };
          } catch (e) {
            return defaultSettings;
          }
        }
        return defaultSettings;
      });
      const [voices, setVoices] = useState([]);
      const [audioStatusText, setAudioStatusText] = useState('準備中');
      const [audioSubStep, setAudioSubStep] = useState('none'); // 'none', 'word', 'spelling', 'translation', 'example', 'pause'
      const [activeSpellingChar, setActiveSpellingChar] = useState(-1);
      const [blindMode, setBlindMode] = useState(false);


      const handleDeleteWord = (indexInVocab, wordObj) => {
        if (indexInVocab === -1) {
          const fallbackWord = wordObj || currentWord;
          if (!fallbackWord) return;
          if (!window.confirm(`此單字已不在目前字庫中，確定要將其從「學習紀錄/錯題本」中移除嗎？`)) return;

          const wordEn = fallbackWord.en;
          // 同步刪除錯題與歷史紀錄
          setState(prev => {
            const nextState = { ...prev };
            if (prev.mistakes && prev.mistakes[wordEn]) {
              nextState.mistakes = { ...prev.mistakes };
              delete nextState.mistakes[wordEn];
            }
            if (prev.historicalMistakes && prev.historicalMistakes[wordEn]) {
              nextState.historicalMistakes = { ...prev.historicalMistakes };
              delete nextState.historicalMistakes[wordEn];
            }
            return nextState;
          });

          // 過濾特訓佇列與本輪所有單字
          const newQueue = queue.filter(w => w.en.trim().toLowerCase() !== wordEn.trim().toLowerCase());
          setQueue(newQueue);
          const newSessionWords = currentSessionWords.filter(w => w.en.trim().toLowerCase() !== wordEn.trim().toLowerCase());
          setCurrentSessionWords(newSessionWords);

          // 如果目前處於特訓模式，且刪除的是當前單字，則自動跳過或結束
          if (view === 'scanning' || view === 'spelling') {
            if (newQueue.length === 0) {
              setView('summary');
            } else {
              if (currentWord && currentWord.en.trim().toLowerCase() === wordEn.trim().toLowerCase()) {
                setCurrentWord(newQueue[0]);
                setUserInput('');
                setTypoCount(0);
                setMustTypeCorrectly(false);
                setCopyFailCount(0);
              }
            }
          }
          return;
        }

        const wordToDelete = vocabList[indexInVocab];
        if (!wordToDelete) return;
        if (!window.confirm(`確定要從此字庫中「徹底刪除」單字【${wordToDelete.en}】嗎？\n此動作無法還原。`)) return;

        const updatedList = [...vocabList];
        updatedList.splice(indexInVocab, 1);
        setVocabList(updatedList);
        localStorage.setItem(`vocab_customVocab_${dbName}`, JSON.stringify(updatedList));

        // 同步刪除錯題與歷史紀錄
        setState(prev => {
          const nextState = { ...prev };
          if (prev.mistakes && prev.mistakes[wordToDelete.en]) {
            nextState.mistakes = { ...prev.mistakes };
            delete nextState.mistakes[wordToDelete.en];
          }
          if (prev.historicalMistakes && prev.historicalMistakes[wordToDelete.en]) {
            nextState.historicalMistakes = { ...prev.historicalMistakes };
            delete nextState.historicalMistakes[wordToDelete.en];
          }
          return nextState;
        });

        // 過濾特訓佇列與本輪所有單字
        const newQueue = queue.filter(w => w.en.trim().toLowerCase() !== wordToDelete.en.trim().toLowerCase());
        setQueue(newQueue);
        const newSessionWords = currentSessionWords.filter(w => w.en.trim().toLowerCase() !== wordToDelete.en.trim().toLowerCase());
        setCurrentSessionWords(newSessionWords);

        // 如果目前處於特訓模式，且刪除的是當前單字，則自動跳過或結束
        if (view === 'scanning' || view === 'spelling') {
          if (newQueue.length === 0) {
            setView('summary');
          } else {
            if (currentWord && currentWord.en.trim().toLowerCase() === wordToDelete.en.trim().toLowerCase()) {
              setCurrentWord(newQueue[0]);
              setUserInput('');
              setTypoCount(0);
              setMustTypeCorrectly(false);
              setCopyFailCount(0);
            }
          }
        }
      };

      const startEditing = (idx) => {
        if (idx === -1) {
          alert('此單字不在目前字庫中，無法編輯。如需編輯，請先將此單字新增至字庫。');
          return;
        }
        const w = vocabList[idx];
        if (!w) return;
        setEditingIndex(idx);
        setEditEn(w.en);
        setEditPos(w.pos);
        setEditZh(w.zh);
        setEditEg(w.eg || '');
      };

      const handleSaveEdit = (e) => {
        if (e) e.preventDefault();
        if (editingIndex === -1) return;
        if (!editEn.trim() || !editZh.trim()) {
          alert('請填寫英文單字與中文解釋！');
          return;
        }

        const originalWord = vocabList[editingIndex];
        const newEn = editEn.trim();
        const newPos = editPos.trim();
        const newZh = editZh.trim();
        const newEg = editEg.trim();
        const newWordData = { en: newEn, pos: newPos, zh: newZh, eg: newEg };

        const updatedList = [...vocabList];
        updatedList[editingIndex] = newWordData;
        setVocabList(updatedList);
        localStorage.setItem(`vocab_customVocab_${dbName}`, JSON.stringify(updatedList));

        // 同步更新錯題本與歷史殿堂資料庫
        setState(prev => {
          const nextState = { ...prev };
          
          if (prev.mistakes && prev.mistakes[originalWord.en]) {
            const m = prev.mistakes[originalWord.en];
            const updatedMistake = { ...m, data: newWordData };
            nextState.mistakes = { ...prev.mistakes };
            if (originalWord.en !== newEn) {
              delete nextState.mistakes[originalWord.en];
              nextState.mistakes[newEn] = updatedMistake;
            } else {
              nextState.mistakes[newEn] = updatedMistake;
            }
          }
          
          if (prev.historicalMistakes && prev.historicalMistakes[originalWord.en]) {
            const h = prev.historicalMistakes[originalWord.en];
            const updatedHistory = { ...h, data: newWordData };
            nextState.historicalMistakes = { ...prev.historicalMistakes };
            if (originalWord.en !== newEn) {
              delete nextState.historicalMistakes[originalWord.en];
              nextState.historicalMistakes[newEn] = updatedHistory;
            } else {
              nextState.historicalMistakes[newEn] = updatedHistory;
            }
          }
          
          return nextState;
        });

        // 同步更新當前正在特訓的字
        if ((view === 'scanning' || view === 'spelling') && currentWord) {
          if (currentWord.en.trim().toLowerCase() === originalWord.en.trim().toLowerCase()) {
            setCurrentWord({
              ...currentWord,
              ...newWordData
            });
          }
          const updatedQueue = queue.map(qw => {
            if (qw.en.trim().toLowerCase() === originalWord.en.trim().toLowerCase()) {
              return {
                ...qw,
                ...newWordData
              };
            }
            return qw;
          });
          setQueue(updatedQueue);
        }

        setEditingIndex(-1);
      };

      const getFilteredVocab = () => {
        const q = allSearchQuery.trim().toLowerCase();
        if (!q) return vocabList.map((w, originalIdx) => ({ ...w, originalIdx }));
        return vocabList
          .map((w, originalIdx) => ({ ...w, originalIdx }))
          .filter(w => w.en.toLowerCase().includes(q) || w.zh.toLowerCase().includes(q) || w.pos.toLowerCase().includes(q));
      };

      const resetDictState = () => {
        setSearchQuery('');
        setSearchLoading(false);
        setSearchError(null);
        setDictResults([]);
        setLocalMatches([]);
        setFormEn('');
        setFormPos('n.');
        setFormZh('');
        setFormEg('');
        setInsertPosition('end');
      };

      const translateText = async (text) => {
        try {
          const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|zh-TW`);
          const json = await res.json();
          return json.responseData.translatedText || '';
        } catch (e) {
          console.error('Translation error:', e);
          return '';
        }
      };

      const performSearch = async (queryStr) => {
        const query = queryStr.trim().toLowerCase();
        if (!query) return;

        setSearchLoading(true);
        setSearchError(null);
        setDictResults([]);

        // 1. 本地跨庫重複性檢查
        const matches = [];
        dbList.forEach(db => {
          const listStr = localStorage.getItem(`vocab_customVocab_${db}`);
          if (listStr) {
            const list = JSON.parse(listStr);
            const foundIdx = list.findIndex(w => w.en.trim().toLowerCase() === query);
            if (foundIdx !== -1) {
              const wPerDay = parseInt(localStorage.getItem(`vocab_wordsPerDay_${db}`) || '50', 10);
              const dayNum = Math.floor(foundIdx / wPerDay) + 1;
              matches.push({ db, word: list[foundIdx], day: dayNum });
            }
          }
        });
        setLocalMatches(matches);

        // 如果目前庫有匹配，預先載入
        const currentDbMatch = matches.find(m => m.db === dbName);
        if (currentDbMatch) {
          setFormEn(currentDbMatch.word.en);
          setFormPos(currentDbMatch.word.pos);
          setFormZh(currentDbMatch.word.zh);
          setFormEg(currentDbMatch.word.eg || '');
        } else {
          setFormEn(queryStr.trim());
          setFormPos('n.');
          setFormZh('');
          setFormEg('');
        }

        // 2. 請求 Free Dictionary API + MyMemory 翻譯
        try {
          const dictRes = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${query}`);
          if (!dictRes.ok) {
            if (dictRes.status === 404) {
              throw new Error('找不到該單字的定義');
            }
            throw new Error('Dictionary API 連線失敗');
          }

          const dictData = await dictRes.json();
          if (!dictData || dictData.length === 0) {
            throw new Error('未找到單字定義');
          }

          // 翻譯單字本身取得主中文解釋
          const wordZh = await translateText(query);

          // 收集全部可用的例句
          const allExamples = [];
          dictData.forEach(entry => {
            entry.meanings.forEach(meaning => {
              const pos = mapPos(meaning.partOfSpeech);
              meaning.definitions.forEach(def => {
                if (def.example) {
                  allExamples.push({
                    pos: pos,
                    egEn: def.example
                  });
                }
              });
            });
          });

          const results = [];
          const firstEntry = dictData[0];

          // 彙整所有的釋義與例句
          firstEntry.meanings.forEach(meaning => {
            const pos = mapPos(meaning.partOfSpeech);
            meaning.definitions.forEach(def => {
              // 尋找適合的例句
              let chosenEgEn = def.example || '';

              // 智慧退路 1：若該釋義沒有例句，則優先借用同詞性的其他例句；若再沒有，借用任何其他例句
              if (!chosenEgEn) {
                const samePosEg = allExamples.find(e => e.pos === pos);
                if (samePosEg) {
                  chosenEgEn = samePosEg.egEn;
                } else if (allExamples.length > 0) {
                  chosenEgEn = allExamples[0].egEn;
                }
              }

              // 智慧退路 2：若整個單字在 API 中完全無任何可用例句（如 algorithm），則使用其英文定義構造一條學術解釋型例句
              if (!chosenEgEn && def.definition) {
                const cleanWord = queryStr.trim();
                const article = /^[aeiou]/i.test(cleanWord) ? 'An' : 'A';
                chosenEgEn = `${article} ${cleanWord} is defined as: ${def.definition}`;
              }

              results.push({
                word: queryStr.trim(),
                pos: pos,
                enDef: def.definition,
                egEn: chosenEgEn,
                zh: wordZh || '',
                eg: ''
              });
            });
          });

          if (results.length === 0) {
            throw new Error('未找到單字定義內容');
          }

          // 限制只對前 4 個項目進行並行翻譯，防止請求過多
          const translationPromises = results.slice(0, 4).map(async (item) => {
            if (item.egEn) {
              const egZh = await translateText(item.egEn);
              item.eg = egZh ? `${item.egEn} (${egZh})` : item.egEn;
            }
          });

          await Promise.all(translationPromises);

          setDictResults(results);
          setFormEn(results[0].word);
          setFormPos(results[0].pos);
          setFormZh(results[0].zh);
          setFormEg(results[0].eg || results[0].egEn || '');
        } catch (err) {
          console.error(err);
          setSearchError(`查詢失敗（${err.message}）。您仍可以直接在下方手動輸入。`);
        } finally {
          setSearchLoading(false);
        }
      };

      const handleSearch = async (e) => {
        if (e) e.preventDefault();
        await performSearch(searchQuery);
      };

      const handleAddWord = (e) => {
        e.preventDefault();
        const enVal = formEn.trim();
        const posVal = formPos.trim();
        const zhVal = formZh.trim();
        const egVal = formEg.trim();

        if (!enVal || !zhVal) {
          alert('請填寫英文單字與中文解釋！');
          return;
        }

        const newWord = { en: enVal, pos: posVal, zh: zhVal };
        if (egVal) newWord.eg = egVal;

        const existingIdx = vocabList.findIndex(w => w.en.trim().toLowerCase() === enVal.toLowerCase());
        let updatedList = [...vocabList];

        if (existingIdx !== -1) {
          if (!window.confirm(`單字【${enVal}】已存在目前字庫中，是否覆寫？`)) return;
          updatedList[existingIdx] = { ...updatedList[existingIdx], ...newWord };
        } else {
          if (insertPosition === 'current') {
            const targetIndex = currentDay * wordsPerDay;
            updatedList.splice(Math.min(targetIndex, updatedList.length), 0, newWord);
          } else {
            updatedList.push(newWord);
          }
        }

        setVocabList(updatedList);
        localStorage.setItem(`vocab_customVocab_${dbName}`, JSON.stringify(updatedList));

        alert(`成功將單字【${enVal}】${existingIdx !== -1 ? '修改' : '新增'}至目前字庫中！`);

        setFormEn('');
        setFormPos('n.');
        setFormZh('');
        setFormEg('');
        setDictResults([]);
        setLocalMatches([]);
      };

      const [queue, setQueue] = useState([]);
      const [currentWord, setCurrentWord] = useState(null);
      const [currentSessionWords, setCurrentSessionWords] = useState([]);

      const [userInput, setUserInput] = useState('');
      const [typoCount, setTypoCount] = useState(0);
      const [mustTypeCorrectly, setMustTypeCorrectly] = useState(false);
      const [copyFailCount, setCopyFailCount] = useState(0);

      const inputRef = useRef(null);

      // --- 系統同步與續傳 ---
      useEffect(() => {
        localStorage.setItem('vocab_currentDB', dbName);
        const savedState = localStorage.getItem(`vocab_state_${dbName}`);
        if (savedState) {
          const parsed = JSON.parse(savedState);
          setState({ ...defaultState, ...parsed });
        } else {
          setState(defaultState);
        }

        const savedVocab = localStorage.getItem(`vocab_customVocab_${dbName}`);
        setVocabList(savedVocab ? JSON.parse(savedVocab) : rawVocab);

        const savedWords = localStorage.getItem(`vocab_wordsPerDay_${dbName}`);
        setWordsPerDay(savedWords ? parseInt(savedWords, 10) : 50);

        const savedGhosts = localStorage.getItem(`vocab_ghostsPerDay_${dbName}`);
        setGhostsPerDay(savedGhosts ? parseInt(savedGhosts, 10) : 10);

        const tempSession = localStorage.getItem(`vocab_tempSession_${dbName}`);
        if (tempSession) {
          const parsed = JSON.parse(tempSession);
          if (parsed.queue && parsed.queue.length > 0 && parsed.date === new Date().toDateString()) {
            if (window.confirm("偵測到今日尚未完成的特訓進度，是否繼續？（選擇取消將放棄該次進度）")) {
              setSessionType(parsed.sessionType);
              setCurrentSessionWords(parsed.currentSessionWords);
              setQueue(parsed.queue);
              setCurrentWord(parsed.queue[0]);
              setView(parsed.view);
            } else {
              localStorage.removeItem(`vocab_tempSession_${dbName}`);
            }
          }
        }
      }, [dbName]);

      useEffect(() => {
        if (dbName) localStorage.setItem(`vocab_state_${dbName}`, JSON.stringify(state));
      }, [state, dbName]);

      useEffect(() => {
        if (dbName) localStorage.setItem(`vocab_wordsPerDay_${dbName}`, wordsPerDay);
      }, [wordsPerDay, dbName]);

      useEffect(() => {
        if (dbName) localStorage.setItem(`vocab_ghostsPerDay_${dbName}`, ghostsPerDay);
      }, [ghostsPerDay, dbName]);

      useEffect(() => {
        localStorage.setItem('vocab_speechRate', speechRate.toString());
      }, [speechRate]);

      useEffect(() => {
        localStorage.setItem('vocab_speechEnabled', speechEnabled.toString());
      }, [speechEnabled]);

      // 自動暫存
      useEffect(() => {
        if (view !== 'dashboard' && view !== 'summary') {
          const sessionData = { queue, currentSessionWords, sessionType, view, date: new Date().toDateString() };
          localStorage.setItem(`vocab_tempSession_${dbName}`, JSON.stringify(sessionData));
        } else if (view === 'summary') {
          localStorage.removeItem(`vocab_tempSession_${dbName}`);
        }
      }, [queue, view, sessionType, dbName, currentSessionWords]);


      // --- 發音 ---
      const speak = (text, isManual = false) => {
        if ('speechSynthesis' in window) {
          if (!isManual && !speechEnabled) return;
          window.speechSynthesis.cancel();
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = 'en-US';
          utterance.rate = speechRate;
          window.speechSynthesis.speak(utterance);
        }
      };

      useEffect(() => {
        if ((view === 'scanning' || view === 'spelling') && currentWord) speak(currentWord.en);
        if (view === 'spelling' && inputRef.current) inputRef.current.focus();
      }, [currentWord, view]);

      // --- 聽音背單字相關系統與發音引擎 ---
      useEffect(() => {
        localStorage.setItem('vocab_audioSettings', JSON.stringify(audioSettings));
      }, [audioSettings]);

      useEffect(() => {
        if (typeof window !== 'undefined' && 'speechSynthesis' in window) {
          const updateVoices = () => {
            const allVoices = window.speechSynthesis.getVoices();
            setVoices(allVoices);
          };
          updateVoices();
          window.speechSynthesis.onvoiceschanged = updateVoices;
        }
      }, []);

      const wakeLockRef = useRef(null);
      const requestWakeLock = async () => {
        try {
          if ('wakeLock' in navigator) {
            wakeLockRef.current = await navigator.wakeLock.request('screen');
          }
        } catch (err) {
          console.warn('Wake Lock request failed:', err);
        }
      };

      const releaseWakeLock = () => {
        if (wakeLockRef.current) {
          wakeLockRef.current.release().then(() => {
            wakeLockRef.current = null;
          });
        }
      };

      const abortControllerRef = useRef(null);

      const unlockSpeechOnIOS = () => {
        if (typeof window !== 'undefined' && 'speechSynthesis' in window) {
          const isIOS = typeof navigator !== 'undefined' && (/iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1));
          if (isIOS) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(' ');
            u.lang = 'en-US';
            u.volume = 0;
            window.speechSynthesis.speak(u);
          }
        }
      };

      const speakAsync = (text, lang, voiceName, signal, rate = speechRate) => {
        return new Promise((resolve) => {
          if (signal.aborted) {
            resolve();
            return;
          }
          if (!('speechSynthesis' in window)) {
            resolve();
            return;
          }

          window.speechSynthesis.cancel();
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = lang;
          utterance.rate = rate;
          utterance.volume = (audioSettings.volume ?? 80) / 100;

          const isIOS = typeof navigator !== 'undefined' && (/iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1));
          if (voiceName && !isIOS) {
            const allVoices = window.speechSynthesis.getVoices();
            const voice = allVoices.find(v => v.name === voiceName);
            if (voice) utterance.voice = voice;
          }

          const onEnd = () => {
            resolve();
          };

          utterance.onend = onEnd;
          utterance.onerror = onEnd;

          const onAbort = () => {
            window.speechSynthesis.cancel();
            resolve();
          };
          signal.addEventListener('abort', onAbort);

          window.speechSynthesis.speak(utterance);
        });
      };

      const delayAsync = (ms, signal) => {
        return new Promise((resolve) => {
          if (signal.aborted) {
            resolve();
            return;
          }
          const timer = setTimeout(() => {
            resolve();
          }, ms);

          signal.addEventListener('abort', () => {
            clearTimeout(timer);
            resolve();
          });
        });
      };

      const stopAudio = () => {
        setIsAudioPlaying(false);
        releaseWakeLock();
        if (abortControllerRef.current) {
          abortControllerRef.current.abort();
        }
        if (typeof window !== 'undefined' && 'speechSynthesis' in window) {
          window.speechSynthesis.cancel();
        }
        setAudioStatusText('已停止');
        setAudioSubStep('none');
        setActiveSpellingChar(-1);
        setView('dashboard');
      };

      const pauseAudio = () => {
        setIsAudioPlaying(false);
        releaseWakeLock();
        if (abortControllerRef.current) {
          abortControllerRef.current.abort();
        }
        if (typeof window !== 'undefined' && 'speechSynthesis' in window) {
          window.speechSynthesis.cancel();
        }
        setAudioStatusText('已暫停');
      };

      const runAudioLoop = async (startIndex, queueToPlay, settings, signal) => {
        let idx = startIndex;
        await requestWakeLock();
        
        while (idx < queueToPlay.length && !signal.aborted) {
          setCurrentAudioIndex(idx);
          const word = queueToPlay[idx];
          if (!word) break;

          for (let rep = 0; rep < settings.repeats; rep++) {
            if (signal.aborted) break;

            // 1. 唸讀英文單字
            setAudioSubStep('word');
            setAudioStatusText(`朗讀單字 (第 ${rep + 1}/${settings.repeats} 次)...`);
            await speakAsync(word.en, 'en-US', settings.enVoiceName, signal);
            if (signal.aborted) break;
            await delayAsync(400, signal);

             // 2. 拼寫字母
             setAudioSubStep('spelling');
             setAudioStatusText(`拼讀字母...`);
             const chars = word.en.toLowerCase().replace(/[^a-z']/g, '').split('');
             
             let spellingFinished = false;
             
             const delayHighlight = (ms) => {
               return new Promise((resolve) => {
                 const start = Date.now();
                 const timer = setInterval(() => {
                   if (spellingFinished || signal.aborted || Date.now() - start >= ms) {
                     clearInterval(timer);
                     resolve();
                   }
                 }, 25);
               });
             };

             const runHighlight = async () => {
               const charDuration = Math.round(480 / (speechRate || 1));
               for (let cIdx = 0; cIdx < chars.length; cIdx++) {
                 if (spellingFinished || signal.aborted) break;
                 setActiveSpellingChar(cIdx);
                 await delayHighlight(charDuration + (settings.spellingPause ?? 0) * 1000);
               }
               setActiveSpellingChar(-1);
             };
             
             runHighlight();

             const spellingStr = chars.join(', ');
             await speakAsync(spellingStr, 'en-US', settings.enVoiceName, signal);
             spellingFinished = true;
             setActiveSpellingChar(-1);
             
             if (signal.aborted) break;
             await delayAsync(500, signal);

            // 3. 唸單字與中文釋義
            setAudioSubStep('translation');
            setAudioStatusText(`朗讀釋義...`);
            await speakAsync(word.en, 'en-US', settings.enVoiceName, signal);
            if (signal.aborted) break;
            await delayAsync(300, signal);

            const cleanZh = word.zh.replace(/^[a-z.]+\s*/i, '');
            await speakAsync(cleanZh, 'zh-TW', settings.zhVoiceName, signal);
            if (signal.aborted) break;
            await delayAsync(500, signal);

            // 4. 例句朗讀
            if (settings.readExample && word.eg) {
              setAudioSubStep('example');
              setAudioStatusText(`朗讀例句...`);
              const parts = word.eg.split(/\s*([（(][^）)]+[）)])\s*$/);
              const egEn = parts[0] ? parts[0].trim() : '';
              const egZh = parts[1] ? parts[1].replace(/[（()）]/g, '').trim() : '';

              if (egEn) {
                await speakAsync(egEn, 'en-US', settings.enVoiceName, signal);
                if (signal.aborted) break;
                await delayAsync(300, signal);
              }
              // 念例句時，中文不必念 (Skip Chinese translation pronunciation)
              /*
              if (egZh) {
                await speakAsync(egZh, 'zh-TW', settings.zhVoiceName, signal);
                if (signal.aborted) break;
                await delayAsync(500, signal);
              }
              */
            }

            // 5. 停頓
            if (rep === settings.repeats - 1) {
              setAudioSubStep('pause');
              setAudioStatusText(`停頓 ${settings.wordPause} 秒...`);
              await delayAsync(settings.wordPause * 1000, signal);
            } else {
              setAudioSubStep('pause');
              setAudioStatusText(`準備重播單字...`);
              await delayAsync(1200, signal);
            }
          }

          if (signal.aborted) break;

          // 判斷是否為單一單字循環模式
          if (audioRange === 'word') {
            continue; // 不遞增索引，重複播放同一個字
          } else {
            idx++;
          }
        }

        if (!signal.aborted) {
          setIsAudioPlaying(false);
          setAudioStatusText('播放完畢');
          setAudioSubStep('none');
          releaseWakeLock();
        }
      };

      const startAudio = (startIndex = currentAudioIndex) => {
        if (audioQueue.length === 0) return;
        setIsAudioPlaying(true);

        if (abortControllerRef.current) {
          abortControllerRef.current.abort();
        }
        const abortController = new AbortController();
        abortControllerRef.current = abortController;

        unlockSpeechOnIOS();
        runAudioLoop(startIndex, audioQueue, audioSettings, abortController.signal);
      };

      const buildAudioQueue = () => {
        let baseList = [];
        if (audioSource === 'daily') {
          const { baseWords, ghostWords } = getDailyWords();
          baseList = [...baseWords.map(w => ({ ...w })), ...ghostWords.map(w => ({ ...w }))];
        } else if (audioSource === 'mistakes') {
          baseList = Object.values(mistakes).filter(m => m.mistakesCount > 0).map(m => m.data);
        } else if (audioSource === 'history') {
          baseList = Object.values(historicalMistakes).map(h => h.data);
        } else if (audioSource === 'library') {
          baseList = vocabList;
        }

        if (baseList.length === 0) return [];

        let finalQueue = [];
        if (audioRange === 'word') {
          const selectIndex = Math.min(Math.max(0, currentAudioIndex), baseList.length - 1);
          finalQueue = [baseList[selectIndex]];
        } else if (audioRange === 'page') {
          const pageNum = audioSource === 'library' ? allPage : 1;
          const start = (pageNum - 1) * itemsPerPage;
          finalQueue = baseList.slice(start, start + itemsPerPage);
        } else if (audioRange === 'custom') {
          const start = Math.max(0, audioStartIdx - 1);
          const end = Math.min(baseList.length, audioEndIdx);
          finalQueue = baseList.slice(start, end);
        } else {
          finalQueue = baseList;
        }
        return finalQueue;
      };

      const startAudioSession = () => {
        const queueToPlay = buildAudioQueue();
        if (queueToPlay.length === 0) {
          alert('選取的範圍內沒有任何單字！');
          return;
        }
        unlockSpeechOnIOS();
        setAudioQueue(queueToPlay);
        setCurrentAudioIndex(0);
        setShowAudioSetupModal(false);
        setView('audio_player');
      };

      const playNextWord = () => {
        if (currentAudioIndex < audioQueue.length - 1) {
          const nextIdx = currentAudioIndex + 1;
          setCurrentAudioIndex(nextIdx);
          setIsAudioPlaying(true);
          if (abortControllerRef.current) {
            abortControllerRef.current.abort();
          }
          const abortController = new AbortController();
          abortControllerRef.current = abortController;
          unlockSpeechOnIOS();
          runAudioLoop(nextIdx, audioQueue, audioSettings, abortController.signal);
        }
      };

      const playPrevWord = () => {
        if (currentAudioIndex > 0) {
          const prevIdx = currentAudioIndex - 1;
          setCurrentAudioIndex(prevIdx);
          setIsAudioPlaying(true);
          if (abortControllerRef.current) {
            abortControllerRef.current.abort();
          }
          const abortController = new AbortController();
          abortControllerRef.current = abortController;
          unlockSpeechOnIOS();
          runAudioLoop(prevIdx, audioQueue, audioSettings, abortController.signal);
        }
      };

      useEffect(() => {
        if (view === 'audio_player' && audioQueue.length > 0 && isAudioPlaying === false) {
          setIsAudioPlaying(true);
          const abortController = new AbortController();
          abortControllerRef.current = abortController;
          runAudioLoop(currentAudioIndex, audioQueue, audioSettings, abortController.signal);
        }
        
        return () => {
          if (view !== 'audio_player') {
            if (abortControllerRef.current) {
              abortControllerRef.current.abort();
            }
            if (typeof window !== 'undefined' && 'speechSynthesis' in window) {
              window.speechSynthesis.cancel();
            }
            releaseWakeLock();
          }
        };
      }, [view, audioQueue]);

      // ----------------------------------------
      // --- 2. 核心邏輯與演算法 ---
      // ----------------------------------------

      const activeMistakesList = Object.values(mistakes).filter(m => m.mistakesCount > 0);
      const mistakesTotal = activeMistakesList.length;
      const historyTotal = Object.keys(historicalMistakes).length;

      // 溫度計指示燈
      let indicator = { color: 'text-emerald-400', border: 'border-emerald-500/40', bg: 'bg-emerald-950/30', icon: '🟢', title: '良好' };
      if (mistakesTotal >= 50) indicator = { color: 'text-amber-400', border: 'border-amber-500/40', bg: 'bg-amber-950/30', icon: '🟡', title: '塞車' };
      if (mistakesTotal >= 100) indicator = { color: 'text-red-400', border: 'border-red-500/40', bg: 'bg-red-950/30', icon: '🔴', title: '過載' };

      // 日常單字擷取 (結合幽靈突襲與撞車濾網)
      const getDailyWords = () => {
        const startIndex = (currentDay - 1) * wordsPerDay;
        let baseWords = vocabList.slice(startIndex, startIndex + wordsPerDay);
        if (baseWords.length === 0 && vocabList.length > 0) baseWords = vocabList.slice(-wordsPerDay);

        const baseEnSet = new Set(baseWords.map(w => w.en));
        const now = Date.now();

        const ghostWords = Object.values(historicalMistakes)
          .filter(h => !h.immune && (now - h.archivedDate) >= (h.interval * 24 * 60 * 60 * 1000))
          .filter(h => !baseEnSet.has(h.data.en)) // 幽靈撞車濾網
          .slice(0, ghostsPerDay)
          .map(h => ({ ...h.data, _hasCountedMistake: false, _isGhost: true, _historyData: h }));

        return { baseWords, ghostWords };
      };

      const startTodaySession = () => {
        const { baseWords, ghostWords } = getDailyWords();
        if (baseWords.length === 0) return alert("字典為空，請先匯入字庫！");

        const initializedWords = baseWords.map(w => ({ ...w, _hasCountedMistake: false }));
        const combined = [...initializedWords, ...ghostWords].sort(() => 0.5 - Math.random());

        setSessionType('daily');
        setCurrentSessionWords(combined);
        setQueue(combined);
        setCurrentWord(combined[0]);
        setView('scanning');
      };

      const startExamSession = () => {
        if (mistakesTotal === 0) return alert("錯題庫目前完美清空，無需降溫大會考！🎉");
        const shuffled = [...activeMistakesList].sort(() => 0.5 - Math.random()).slice(0, 50).map(m => ({ ...m.data, _hasCountedMistake: false }));
        setSessionType('exam');
        setCurrentSessionWords(shuffled);
        setQueue(shuffled);
        setCurrentWord(shuffled[0]);
        setTypoCount(0);
        setMustTypeCorrectly(false);
        setCopyFailCount(0);
        setUserInput('');
        setView('spelling');
      };

      const startHistoryCheck = () => {
        if (historyTotal === 0) return alert("歷史殿堂目前為空，請先完成日常錯題的雙倍消除！");
        const shuffled = Object.values(historicalMistakes).sort(() => 0.5 - Math.random()).slice(0, 50).map(h => ({ ...h.data, _hasCountedMistake: false, _isHistoryCheck: true, _historyData: h }));
        setSessionType('history');
        setCurrentSessionWords(shuffled);
        setQueue(shuffled);
        setCurrentWord(shuffled[0]);
        setTypoCount(0);
        setMustTypeCorrectly(false);
        setCopyFailCount(0);
        setUserInput('');
        setView('spelling');
      };

      const punishWord = (wordObj) => {
        setState(prev => {
          const m = prev.mistakes[wordObj.en] || { mistakesCount: 0, correctCount: 0, data: wordObj };
          const newMistakes = { ...prev.mistakes, [wordObj.en]: { ...m, mistakesCount: m.mistakesCount + 1, correctCount: 0 } };
          const newHistory = { ...prev.historicalMistakes };
          if (wordObj._isGhost || wordObj._isHistoryCheck) delete newHistory[wordObj.en]; // 踢出殿堂
          return { ...prev, mistakes: newMistakes, historicalMistakes: newHistory };
        });
      };

      // 誠實按鈕：手動強制加入錯題
      const handleForceMistake = () => {
        speak(currentWord.en);
        punishWord(currentWord);
        proceedToNext();
      };

      // 白旗按鈕：腦袋空白直接放棄
      const handleSurrender = () => {
        speak(currentWord.en);
        setTypoCount(2);
        setMustTypeCorrectly(true);
        setCopyFailCount(0);
        setUserInput('');
        if (!currentWord._hasCountedMistake) {
          currentWord._hasCountedMistake = true;
          punishWord(currentWord);
        }
      };

      // 第一關：快速掃描
      const handleScan = (isKnown) => {
        const current = queue[0];
        const newQueue = queue.slice(1);

        setState(prev => ({
          ...prev,
          learnedWords: prev.learnedWords.includes(current.en) ? prev.learnedWords : [...prev.learnedWords, current.en]
        }));

        if (!isKnown) {
          current._hasCountedMistake = true;
          punishWord(current);
        }

        if (newQueue.length === 0) {
          setQueue(currentSessionWords);
          setCurrentWord(currentSessionWords[0]);
          setTypoCount(0);
          setMustTypeCorrectly(false);
          setCopyFailCount(0);
          setUserInput('');
          setView('spelling');
        } else {
          setQueue(newQueue);
          setCurrentWord(newQueue[0]);
        }
      };

      // 觸控手勢
      useEffect(() => {
        let touchStartX = 0, touchStartY = 0;
        const handleKeyDown = (e) => {
          if (view === 'scanning' && currentWord) {
            if (e.key === 'ArrowLeft') handleScan(false); // 左方向鍵=不熟
            if (e.key === 'ArrowRight') handleScan(true); // 右方向鍵=認識
          }
        };
        const handleTouchStart = (e) => { if (view === 'scanning') { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; } };
        const handleTouchEnd = (e) => {
          if (view !== 'scanning') return;
          const diffX = e.changedTouches[0].clientX - touchStartX;
          const diffY = e.changedTouches[0].clientY - touchStartY;
          if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
            if (diffX > 0) handleScan(true); else handleScan(false); // 右滑=認識, 左滑=不熟
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('touchstart', handleTouchStart, { passive: true });
        window.addEventListener('touchend', handleTouchEnd, { passive: true });
        return () => {
          window.removeEventListener('keydown', handleKeyDown);
          window.removeEventListener('touchstart', handleTouchStart);
          window.removeEventListener('touchend', handleTouchEnd);
        };
      }, [view, currentWord, queue]);

      // 第二關：填空盲測
      const handleSpellingSubmit = (e) => {
        e.preventDefault();
        const cleanInput = cleanApostrophe(userInput);
        const cleanTarget = cleanApostrophe(currentWord.en);
        const isCorrect = cleanInput === cleanTarget;

        if (isCorrect) {
          if (mustTypeCorrectly) {
            setCopyFailCount(0);
            proceedToNext();
            return;
          }

          setState(prev => {
            const nextState = { ...prev };

            // 雙倍消除法
            if (prev.mistakes[currentWord.en]) {
              const m = prev.mistakes[currentWord.en];
              const newCorrect = (m.correctCount || 0) + 1;
              const target = Math.min(m.mistakesCount * 2, 6);

              if (newCorrect >= target) {
                const newHistory = { ...prev.historicalMistakes };
                newHistory[currentWord.en] = {
                  mistakesCount: m.mistakesCount,
                  totalFails: (newHistory[currentWord.en]?.totalFails || 0) + m.mistakesCount,
                  archivedDate: Date.now(),
                  step: 0, interval: 7, immune: false, data: currentWord
                };
                delete nextState.mistakes[currentWord.en];
                nextState.historicalMistakes = newHistory;
              } else {
                nextState.mistakes = { ...prev.mistakes, [currentWord.en]: { ...m, correctCount: newCorrect } };
              }
            }

            // 幽靈突襲升級 (7 -> 21 -> 60 -> 180 -> immune)
            if (currentWord._isGhost) {
              const intervals = [7, 21, 60, 180];
              const h = currentWord._historyData;
              const nextStep = (h.step || 0) + 1;
              const newHistory = { ...nextState.historicalMistakes };

              if (nextStep >= 4) {
                newHistory[currentWord.en] = { ...h, immune: true };
              } else {
                newHistory[currentWord.en] = { ...h, step: nextStep, interval: intervals[nextStep], archivedDate: Date.now() };
              }
              nextState.historicalMistakes = newHistory;
            }

            return nextState;
          });
          proceedToNext();
        } else {
          speak(currentWord.en);
          if (mustTypeCorrectly) {
            const nextCopyFail = copyFailCount + 1;
            if (nextCopyFail >= 3) {
              alert(`已連續輸入錯誤 ${nextCopyFail} 次，系統自動跳過此單字：${currentWord.en}`);
              setCopyFailCount(0);
              proceedToNext();
            } else {
              setCopyFailCount(nextCopyFail);
              setUserInput('');
            }
          } else {
            if (typoCount === 0) {
              setTypoCount(1);
              setUserInput('');
            } else {
              setTypoCount(2);
              setMustTypeCorrectly(true);
              setCopyFailCount(0);
              setUserInput('');
              if (!currentWord._hasCountedMistake) {
                currentWord._hasCountedMistake = true;
                punishWord(currentWord);
              }
            }
          }
        }
      };

      const proceedToNext = () => {
        const newQueue = queue.slice(1);
        setTypoCount(0);
        setMustTypeCorrectly(false);
        setCopyFailCount(0);
        setUserInput('');
        if (newQueue.length === 0) {
          if (sessionType === 'daily') {
            const todayStr = new Date().toDateString();
            setState(prev => {
              const last = prev.streak?.lastDate;
              let newCount = prev.streak?.count || 0;
              if (last !== todayStr) {
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                if (last === yesterday.toDateString()) newCount += 1;
                else newCount = 1;
              }
              return { ...prev, streak: { count: newCount, lastDate: todayStr } };
            });
          }
          setView('summary');
        } else {
          setQueue(newQueue); setCurrentWord(newQueue[0]);
        }
      };

      const handleExitSession = () => { if (window.confirm("確定要暫停離開嗎？系統已為您存檔。")) setView('dashboard'); };
      const goToNextDay = () => {
        if (sessionType === 'daily') setState(prev => ({ ...prev, currentDay: prev.currentDay + 1 }));
        setView('dashboard');
      };

      // ----------------------------------------
      // --- 3. 檔案匯入匯出與重置功能 ---
      // ----------------------------------------
      const downloadFile = (filename, content, type) => {
        const element = document.createElement("a");
        const file = new Blob([content], { type });
        element.href = URL.createObjectURL(file);
        element.download = filename;
        document.body.appendChild(element);
        element.click();
        document.body.removeChild(element);
      };

      const exportJson = () => {
        // 匯出所有的資料庫與設定值
        const allDatabases = {};
        dbList.forEach(db => {
          const vocab = localStorage.getItem(`vocab_customVocab_${db}`);
          const st = localStorage.getItem(`vocab_state_${db}`);
          const wpd = localStorage.getItem(`vocab_wordsPerDay_${db}`);
          const gpd = localStorage.getItem(`vocab_ghostsPerDay_${db}`);
          allDatabases[db] = {
            vocabList: vocab ? JSON.parse(vocab) : null,
            state: st ? JSON.parse(st) : null,
            wordsPerDay: wpd ? parseInt(wpd, 10) : null,
            ghostsPerDay: gpd ? parseInt(gpd, 10) : null,
          };
        });

        const backup = {
          version: "2.0",
          backupType: "full_system",
          exportDate: new Date().toISOString(),
          global: {
            dbList,
            currentDB: dbName,
            speechRate,
            speechEnabled
          },
          // 保持與舊版本的向後相容性
          dbName,
          state,
          vocabList,
          wordsPerDay,
          ghostsPerDay,
          allDatabases
        };

        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        const timeStr = `${year}${month}${day}_${hours}${minutes}${seconds}`;
        downloadFile(`極限完整備份_${timeStr}.json`, JSON.stringify(backup, null, 2), 'application/json');
      };

      const handleImportJson = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);

            // 支援 A：純單字清單陣列 JSON 格式
            if (Array.isArray(data)) {
              if (data.length > 0 && (data[0].en || data[0].word) && (data[0].zh || data[0].meaning)) {
                if (window.confirm(`偵測到此檔案為「單字清單格式」（共 ${data.length} 字）。\n\n是否將其匯入為目前字庫【${dbName}】的完整字庫？\n(這將會覆蓋目前字庫的單字，但保留您的學習紀錄與錯題)`)) {
                  const imported = data.map(item => ({
                    en: (item.en || item.word || '').trim(),
                    zh: (item.zh || item.meaning || '').trim(),
                    pos: (item.pos || 'n.').trim(),
                    eg: (item.eg || item.example || '').trim()
                  })).filter(item => item.en && item.zh);

                  if (imported.length > 0) {
                    setVocabList(imported);
                    localStorage.setItem(`vocab_customVocab_${dbName}`, JSON.stringify(imported));
                    alert(`單字清單匯入成功！共載入 ${imported.length} 個單字。`);
                  } else {
                    alert(`匯入失敗，未找到有效的英文與中文欄位。`);
                  }
                  return;
                }
              }
            }

            // 支援 B：全新完整系統備份格式 (v2.0)
            if (data && data.backupType === "full_system" && data.allDatabases) {
              if (window.confirm(`偵測到此檔案為「系統完整備份檔案」（包含全部 ${data.global?.dbList?.length || 0} 個字庫及其學習進度與設定）。\n\n注意：這將會完全覆蓋您目前瀏覽器的所有字庫與學習進度！\n確定要繼續還原嗎？`)) {
                
                // 1. 還原全域變數
                const backupGlobal = data.global || {};
                const importedDbList = backupGlobal.dbList || ['vocab_2000', 'vocab_7000'];
                const importedCurrentDB = backupGlobal.currentDB || 'vocab_2000';
                const importedSpeechRate = backupGlobal.speechRate || 0.8;
                const importedSpeechEnabled = backupGlobal.speechEnabled !== undefined ? backupGlobal.speechEnabled : true;

                localStorage.setItem('vocab_dbList', JSON.stringify(importedDbList));
                localStorage.setItem('vocab_currentDB', importedCurrentDB);
                localStorage.setItem('vocab_speechRate', importedSpeechRate.toString());
                localStorage.setItem('vocab_speechEnabled', importedSpeechEnabled.toString());

                // 2. 還原各資料庫
                Object.keys(data.allDatabases).forEach(db => {
                  const dbData = data.allDatabases[db];
                  if (dbData.vocabList) {
                    localStorage.setItem(`vocab_customVocab_${db}`, JSON.stringify(dbData.vocabList));
                  }
                  if (dbData.state) {
                    localStorage.setItem(`vocab_state_${db}`, JSON.stringify(dbData.state));
                  }
                  if (dbData.wordsPerDay !== null && dbData.wordsPerDay !== undefined) {
                    localStorage.setItem(`vocab_wordsPerDay_${db}`, dbData.wordsPerDay);
                  }
                  if (dbData.ghostsPerDay !== null && dbData.ghostsPerDay !== undefined) {
                    localStorage.setItem(`vocab_ghostsPerDay_${db}`, dbData.ghostsPerDay);
                  }
                });

                // 3. 更新 React 狀態
                setDbList(importedDbList);
                setSpeechRate(importedSpeechRate);
                setSpeechEnabled(importedSpeechEnabled);
                setDbName(importedCurrentDB);

                // 如果導入的 dbName 剛好和目前的相同，我們手動更新狀態
                if (dbName === importedCurrentDB) {
                  const savedState = localStorage.getItem(`vocab_state_${importedCurrentDB}`);
                  setState(savedState ? JSON.parse(savedState) : defaultState);
                  
                  const savedVocab = localStorage.getItem(`vocab_customVocab_${importedCurrentDB}`);
                  setVocabList(savedVocab ? JSON.parse(savedVocab) : rawVocab);
                  
                  const savedWords = localStorage.getItem(`vocab_wordsPerDay_${importedCurrentDB}`);
                  setWordsPerDay(savedWords ? parseInt(savedWords, 10) : 50);
                  
                  const savedGhosts = localStorage.getItem(`vocab_ghostsPerDay_${importedCurrentDB}`);
                  setGhostsPerDay(savedGhosts ? parseInt(savedGhosts, 10) : 10);
                }

                alert(`系統完整還原成功！已成功載入 ${importedDbList.length} 個字庫，並切換至：${importedCurrentDB}`);
                return;
              }
            }

            // 支援 C：單一資料庫備份格式 (舊版 / 傳統格式)
            if (data && data.state) {
              const importedDbName = data.dbName || dbName || 'vocab_2000';
              let importedState = { ...defaultState, ...data.state };

              // 補足歷史殿堂預設值 (若從無歷史殿堂舊版本匯入)
              if (!importedState.historicalMistakes) {
                importedState.historicalMistakes = {};
              }

              let currentDbList = [...dbList];
              if (!currentDbList.includes(importedDbName)) {
                currentDbList.push(importedDbName);
                setDbList(currentDbList);
                localStorage.setItem('vocab_dbList', JSON.stringify(currentDbList));
              }

              localStorage.setItem('vocab_currentDB', importedDbName);
              localStorage.setItem(`vocab_state_${importedDbName}`, JSON.stringify(importedState));
              localStorage.setItem(`vocab_customVocab_${importedDbName}`, JSON.stringify(data.vocabList || data.customVocab || rawVocab));
              localStorage.setItem(`vocab_wordsPerDay_${importedDbName}`, data.wordsPerDay || 50);
              localStorage.setItem(`vocab_ghostsPerDay_${importedDbName}`, data.ghostsPerDay || 10);

              setDbName(importedDbName);
              setState(importedState);
              setVocabList(data.vocabList || data.customVocab || rawVocab);
              setWordsPerDay(data.wordsPerDay || 50);
              setGhostsPerDay(data.ghostsPerDay || 10);
              alert(`成功覆蓋還原單一字庫！已切換至資料庫：${importedDbName}`);
              return;
            }

            alert("JSON 格式不符，請確認是正確的備份檔案。");
          } catch (err) {
            console.error(err);
            alert("檔案解析失敗。");
          }
        };
        reader.readAsText(file);
        e.target.value = "";
      };

      const exportDictionaryTXT = () => {
        let content = "=== 特訓完整字庫 ===\n\n";
        vocabList.forEach((w, idx) => {
          content += `${idx + 1}. [${w.pos}] ${w.en} --> ${w.zh}${w.eg ? ` || ${w.eg}` : ''}\n`;
        });
        downloadFile(`字典_${dbName}.txt`, content, 'text/plain');
      };
 
      const exportHistoryTXT = () => {
        const historyList = Object.values(state.historicalMistakes);
        if (historyList.length === 0) return alert("歷史殿堂目前空空如也，無需匯出。");
        let content = `=== 歷史殿堂單字個人紀錄 ===\n\n`;
        historyList.forEach((m, idx) => {
          const vocabWord = vocabList.find(w => w.en === m.data.en);
          const currentEg = (vocabWord && vocabWord.eg) || m.data.eg || '';
          content += `${idx + 1}. 錯誤次數: ${m.mistakesCount}次 | [${m.data.pos}] ${m.data.en} --> ${m.data.zh}${currentEg ? ` || ${currentEg}` : ''}\n`;
        });
        downloadFile(`歷史殿堂_${dbName}.txt`, content, 'text/plain');
      };
 
      const handleImportHistoryTXT = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          const text = event.target.result;
          if (text.includes("歷史殿堂單字個人紀錄")) {
            const lines = text.split("\n");
            const importedVocab = [];
            const importedHistory = {};
            let count = 0;
 
            lines.forEach(line => {
              const match = line.match(/錯誤(?:次數)?[:\s]*(\d+)次\s*\|\s*\[(.*?)\]\s*(.+?)\s*-->\s*(.*)/);
              if (match) {
                const [_, mistakesCount, pos, en, rest] = match;
                const wordKey = en.trim();
                const mCount = parseInt(mistakesCount, 10);
                
                let zh = rest.trim();
                let eg = '';
                if (zh.includes(' || ')) {
                  const parts = zh.split(' || ');
                  zh = parts[0].trim();
                  eg = parts[1].trim();
                }
                
                if (!eg) {
                  const vocabWord = vocabList.find(w => w.en === wordKey);
                  if (vocabWord && vocabWord.eg) {
                    eg = vocabWord.eg;
                  }
                }

                const wordObj = { en: wordKey, zh: zh, pos: pos.trim(), eg: eg };
                
                importedVocab.push(wordObj);
                importedHistory[wordKey] = {
                  mistakesCount: mCount,
                  totalFails: mCount,
                  archivedDate: Date.now(),
                  step: 0,
                  interval: 7,
                  immune: false,
                  data: wordObj
                };
                count++;
              }
            });
 
            if (count === 0) {
              alert("未偵測到任何有效的歷史殿堂單字格式。");
              return;
            }
 
            setState(prev => {
              const newHistory = { ...prev.historicalMistakes, ...importedHistory };
              return { ...prev, historicalMistakes: newHistory };
            });
            alert(`成功將 ${count} 個單字匯入至目前的【🏛️ 歷史殿堂】中！`);
          } else {
            alert("檔案格式不符，請確認是正確的歷史殿堂備份 TXT 檔案。");
          }
        };
        reader.readAsText(file);
        e.target.value = "";
      };
 
      const handleImportTXT = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          const text = event.target.result;
          if (text.includes("特訓完整字庫")) {
            const lines = text.split("\n");
            const importedVocab = [];
            lines.forEach(line => {
              const match = line.match(/\d+\.\s*\[(.*?)\]\s*(.+?)\s*-->\s*(.*)/);
              if (match) {
                const pos = match[1].trim();
                const en = match[2].trim();
                const rest = match[3].trim();
                
                let zh = rest;
                let eg = '';
                if (rest.includes(' || ')) {
                  const parts = rest.split(' || ');
                  zh = parts[0].trim();
                  eg = parts[1].trim();
                }
                
                importedVocab.push({ en, zh, pos, eg });
              }
            });
            if (importedVocab.length > 0) {
              setVocabList(importedVocab);
              localStorage.setItem(`vocab_customVocab_${dbName}`, JSON.stringify(importedVocab));
              alert(`字典匯入成功！共 ${importedVocab.length} 字。`);
            }
          } else if (text.includes("歷史殿堂單字個人紀錄")) {
            const lines = text.split("\n");
            const importedVocab = [];
            lines.forEach(line => {
              const match = line.match(/錯誤(?:次數)?[:\s]*\d+次\s*\|\s*\[(.*?)\]\s*(.+?)\s*-->\s*(.*)/);
              if (match) {
                const pos = match[1].trim();
                const en = match[2].trim();
                const rest = match[3].trim();
                
                let zh = rest;
                let eg = '';
                if (rest.includes(' || ')) {
                  const parts = rest.split(' || ');
                  zh = parts[0].trim();
                  eg = parts[1].trim();
                }
                importedVocab.push({ en, zh, pos, eg });
              }
            });
            if (importedVocab.length > 0) {
              const existingMap = new Map(vocabList.map(w => [w.en.trim().toLowerCase(), w]));
              importedVocab.forEach(w => {

              setVocabList(mergedVocab);
              localStorage.setItem(`vocab_customVocab_${dbName}`, JSON.stringify(mergedVocab));
              alert(`成功將歷史殿堂單字追加至目前字典字庫！共追加 ${importedVocab.length} 字（去重後字庫總計 ${mergedVocab.length} 字）。\n（此操作未重置當前學習天數與進度。）`);
            } else {
              alert("無法識別檔案內容，請確認是正確的歷史殿堂備份 TXT 檔案。");
            }
          } else {
            alert("無法識別檔案格式，請確認是正確的字庫備份或歷史殿堂備份 TXT 檔案。");
          }
        };
        reader.readAsText(file);
        e.target.value = "";
      };

      const loadBuiltInVocab = async (vocabType) => {
        const titleName = vocabType === '7000' ? '7000 單字庫' : '2000 單字庫';
        const remoteUrl = vocabType === '7000'
          ? 'https://raw.githubusercontent.com/leohong/VocabTool/main/7000_%E5%96%AE%E5%AD%97%E5%BA%AB.txt'
          : 'https://raw.githubusercontent.com/leohong/VocabTool/main/2000_%E5%96%AE%E5%AD%97%E5%BA%AB.txt';

        try {
          const response = await fetch(remoteUrl);
          if (!response.ok) {
            throw new Error(`HTTP Error ${response.status}`);
          }
          const text = await response.text();
          const lines = text.split("\n");
          const importedVocab = [];

          lines.forEach(line => {
            const match = line.match(/\d+\.\s*\[(.*?)\]\s*(.+?)\s*-->\s*(.*)/);
            if (match) {
              const pos = match[1].trim();
              const en = match[2].trim();
              const rest = match[3].trim();
              
              let zh = rest;
              let eg = '';
              if (rest.includes(' || ')) {
                const parts = rest.split(' || ');
                zh = parts[0].trim();
                eg = parts[1].trim();
              }
              
              importedVocab.push({ en, zh, pos, eg });
            }
          });

          if (importedVocab.length > 0) {
            if (window.confirm(`確定要載入內建的【${titleName}】（共 ${importedVocab.length} 字）並覆蓋目前的字庫【${dbName}】嗎？`)) {
              setVocabList(importedVocab);
              localStorage.setItem(`vocab_customVocab_${dbName}`, JSON.stringify(importedVocab));
              alert(`成功載入內建【${titleName}】！共載入 ${importedVocab.length} 個單字。`);
            }
          } else {
            alert("載入的內建檔案格式無法識別！");
          }
        } catch (err) {
          console.error("Built-in fetch error:", err);
          alert(`無法從 GitHub 連線取得內建【${titleName}】（可能處於離線狀態）。\n\n將自動為您開啟本機檔案選取器，請選擇您的單字檔進行匯入。`);
          if (importTxtInputRef.current) {
            importTxtInputRef.current.click();
          }
        }
      };

      const handleAddDB = () => {
        const newName = window.prompt("請輸入全新資料庫代碼 (僅限英文與數字):");
        if (newName && newName.trim()) {
          const cleaned = newName.replace(/[^a-zA-Z0-9_]/g, '');
          if (cleaned && !dbList.includes(cleaned)) {
            const updated = [...dbList, cleaned];
            setDbList(updated);
            localStorage.setItem('vocab_dbList', JSON.stringify(updated));
          }
          if (cleaned) setDbName(cleaned);
        }
      };

      const resetProgress = () => {
        if (window.confirm(`確定清除【${dbName}】的所有學習紀錄嗎？(包含歷史殿堂，無法復原)`)) setState(defaultState);
      };

      const deleteCurrentDB = () => {
        if (window.confirm(`警告：確定要徹底刪除【${dbName}】字庫的所有資料與設定嗎？此操作無法復原。`)) {
          Object.keys(localStorage).forEach(key => { if (key.includes(`_${dbName}`)) localStorage.removeItem(key); });
          const updatedList = dbList.filter(name => name !== dbName);
          const nextDb = updatedList.length > 0 ? updatedList[0] : 'vocab_2000';
          setDbList(updatedList);
          localStorage.setItem('vocab_dbList', JSON.stringify(updatedList.length > 0 ? updatedList : ['vocab_2000']));
          setDbName(nextDb);
          alert(`已刪除字庫【${dbName}】。`);
          window.location.reload();
        }
      };

      // ----------------------------------------
      // --- 4. 畫面渲染 (UI) ---
      // ----------------------------------------
      return (
        <div className="w-full flex flex-col">

          {!(view === 'spelling' && isInputFocused) && <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 bg-slate-800 p-3 sm:p-4 rounded-xl shadow-md border border-slate-700 gap-3 sm:gap-4">

            {/* 標題獨立在最前面 (手機版佔用第一行) */}
            <h1 className="text-lg font-bold text-indigo-400 flex items-center gap-1.5 shrink-0">
              <IconBook /> 極限特訓 <span className="text-[10px] text-slate-500 font-mono font-normal">v{DISPLAY_VERSION}</span>
              <a href="https://github.com/leohong/VocabTool/blob/main/README.md" target="_blank" rel="noopener noreferrer" className="ml-2 px-1.5 py-0.5 text-[10px] font-medium text-indigo-300 bg-indigo-950/50 hover:bg-indigo-900/60 border border-indigo-500/30 rounded-md transition-colors flex items-center gap-1">
                📖 說明書
              </a>
            </h1>

            {/* 狀態、打卡、進度強制放在同一水平容器中 (手機版佔用第二行) */}
            <div className="flex items-center w-full md:w-auto gap-2 overflow-x-auto pb-1 md:pb-0 [&::-webkit-scrollbar]:hidden [-ms-overflow-style:none] [scrollbar-width:none]">

              <div className={`border px-2 py-1 rounded-md flex items-center gap-1.5 transition-colors shadow-sm shrink-0 ${indicator.bg} ${indicator.border}`}>
                <span className="text-[10px]">{indicator.icon}</span>
                <span className={`font-bold text-xs tracking-wide ${indicator.color}`}>{indicator.title}</span>
                <span className={`text-[11px] font-mono ml-1 pl-1.5 border-l opacity-80 ${indicator.border}`}>負債: {mistakesTotal}</span>

                          let displayChar = char;
                          if (blindMode) {
